name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
    - name: Delete release if exists
      run: gh release delete "$GITHUB_REF_NAME" -y --repo "$GITHUB_REPOSITORY"
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - name: Create release
      run: gh release create "$GITHUB_REF_NAME" --generate-notes --repo "$GITHUB_REPOSITORY"
      env:
        GITHUB_TOKEN: ${{ github.token }}
